    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0309; color: #FDF6E9; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #C9A24B; font-size: 24px; margin-bottom: 8px; }
    p.subtitle { color: #FDF6E9/60; font-size: 14px; margin-bottom: 24px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h3 { color: #C9A24B; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .log { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.8; max-height: 200px; overflow-y: auto; }
    .log .ok { color: #4ade80; }
    .log .err { color: #f87171; }
    .log .info { color: #60a5fa; }
    .log .warn { color: #fbbf24; }
    button { background: linear-gradient(135deg, #C9A24B, #a8862e); color: #000; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status.pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status.success { background: rgba(74,222,128,0.15); color: #4ade80; }
    .status.error { background: rgba(248,113,113,0.15); color: #f87171; }
  </style>
</head>

      apiKey: "AIzaSyAonRasC2MVqzfpAblL4TvTAQ3O0bw5y0g",

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const SITE_ID = "site-1";

    const logEl = document.getElementById('log');
    const statusBadge = document.getElementById('status-badge');
    const btnSeed = document.getElementById('btn-seed');

    function log(msg, type = 'info') {
      const span = document.createElement('span');
      span.className = type;
      span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, type) {
      statusBadge.textContent = text;
      statusBadge.className = 'status ' + type;
    }

    const DEFAULT_CONFIG = {

        }
      },
      event: {
        date: "2026-07-24T10:00:00+08:00",

        mapsEmbedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3944.204555815339!2d115.25301887463567!3d-8.672051691375787!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd2405d4f3b2591%3A0xb3fcba5d5f22e86!2sJl.%20Danau%20Buyan%20No.12%2C%20Sanur%20Kauh%2C%20Denpasar%20Sel.%2C%20Kota%20Denpasar%2C%20Bali%2080227!5e0!3m2!1sid!2sid!4v1700000000000!5m2!1sid!2sid",

      ],
      whatsappTextFormat: "Om Swastyastu! Kami mengundang Anda untuk menghadiri Upacara Pernikahan Bersama kami (Putu & Widya, Julianto & Elyana). Lihat detail selengkapnya di undangan online kami: {linkUndangan}"
    };

    const DEFAULT_PHOTOS = [
      { id: '1', url: 'https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=600&q=80', order: 1, orientation: 'left' },
      { id: '2', url: 'https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=600&q=80', order: 2, orientation: 'right' },
      { id: '3', url: 'https://images.unsplash.com/photo-1523438885200-e635ba2c371e?auto=format&fit=crop&w=600&q=80', order: 3, orientation: 'left' },
      { id: '4', url: 'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?auto=format&fit=crop&w=600&q=80', order: 4, orientation: 'right' },
      { id: '5', url: 'https://images.unsplash.com/photo-1519225495810-7512c696505a?auto=format&fit=crop&w=600&q=80', order: 5, orientation: 'left' },
      { id: '6', url: 'https://images.unsplash.com/photo-1507504038482-7621006b307a?auto=format&fit=crop&w=600&q=80', order: 6, orientation: 'right' }
    ];

    const DEFAULT_ANNOUNCEMENT = {
      title: "Selamat Datang di Undangan Digital",
      content: "Undangan pernikahan digital ini telah aktif. Semua fitur seperti buku tamu, RSVP, dan live visitor sudah berjalan secara realtime. Terima kasih atas kehadiran dan doa restu Anda!",
      senderType: "developer",
      createdAt: new Date().toISOString()
    };

    async function seedCollection(name, seedFn) {
      try {
        log(`Seeding collection: ${name}...`, 'info');
        await seedFn();
        log(`✅ ${name} — berhasil!`, 'ok');
        return true;
      } catch (err) {
        log(`❌ ${name} — gagal: ${err.message}`, 'err');
        return false;
      }
    }

    window.runSeed = async function() {
      btnSeed.disabled = true;
      setStatus('Memproses...', 'pending');
      logEl.innerHTML = '';
      log('🔥 Memulai seed database...', 'info');
      log(`Project: undanganadmin | Site: ${SITE_ID}`, 'info');
      log('---', 'info');

      let success = 0;
      let failed = 0;

      // 1. Seed config
      if (await seedCollection('sites/site-1/config/main', async () => {
        await setDoc(doc(db, `sites/${SITE_ID}/config/main`), DEFAULT_CONFIG);
      })) success++; else failed++;

      // 2. Seed gallery
      if (await seedCollection('sites/site-1/gallery (6 photos)', async () => {
        for (const photo of DEFAULT_PHOTOS) {
          await setDoc(doc(db, `sites/${SITE_ID}/gallery/${photo.id}`), photo);
        }
      })) success++; else failed++;

      // 3. Seed announcements (welcome message)
      if (await seedCollection('sites/site-1/announcements/welcome', async () => {
        await setDoc(doc(db, `sites/${SITE_ID}/announcements/welcome`), DEFAULT_ANNOUNCEMENT);
      })) success++; else failed++;

      // 4. Create empty RSVP placeholder
      if (await seedCollection('sites/site-1/rsvp/_placeholder', async () => {
        await setDoc(doc(db, `sites/${SITE_ID}/rsvp/_seed_info`), {
          seededAt: new Date().toISOString(),
          note: "This is a seed placeholder. Real RSVPs will be created by guests."
        });
      })) success++; else failed++;

      // 5. Create empty guestbook placeholder
      if (await seedCollection('sites/site-1/guestbook/_placeholder', async () => {
        await setDoc(doc(db, `sites/${SITE_ID}/guestbook/_seed_info`), {
          seededAt: new Date().toISOString(),
          note: "This is a seed placeholder. Real messages will be created by guests."
        });
      })) success++; else failed++;

      // 6. Verify all collections
      log('---', 'info');
      log('🔍 Verifikasi collections...', 'info');
      const collections = ['config', 'gallery', 'announcements', 'rsvp', 'guestbook', 'liveVisitors'];
      for (const col of collections) {
        try {
          const snap = await getDocs(collection(db, `sites/${SITE_ID}/${col}`));
          log(`  📁 ${col} → ${snap.size} dokumen`, snap.size > 0 ? 'ok' : 'warn');
        } catch (err) {
          log(`  📁 ${col} → ERROR: ${err.message}`, 'err');
        }
      }

      log('---', 'info');
      if (failed === 0) {
        log('🎉 Semua collections berhasil di-seed!', 'ok');
        setStatus('Berhasil!', 'success');
      } else {
        log(`⚠️ ${success} berhasil, ${failed} gagal. Cek Firestore Rules di Firebase Console.`, 'warn');
        setStatus('Sebagian Gagal', 'error');
      }
      log('✨ Seed selesai. Kamu bisa tutup halaman ini.', 'info');
      btnSeed.disabled = false;
    };
  </script>
